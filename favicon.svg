<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d672;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#059652;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#050505"/>
  <!-- Leaf shape -->
  <g transform="translate(256, 270) scale(1.1) rotate(-15)">
    <path d="M0,-120 C60,-120 120,-80 120,0 C120,80 60,120 0,120 C-30,120 -60,80 -60,40 C-60,0 -30,-40 0,-40 C15,-40 30,-20 30,0 C30,20 15,40 0,40"
          fill="url(#leafGrad)" opacity="0.95"/>
    <!-- Leaf vein -->
    <line x1="0" y1="-100" x2="0" y2="100" stroke="#050505" stroke-width="3" opacity="0.3"/>
    <line x1="0" y1="-60" x2="40" y2="-30" stroke="#050505" stroke-width="2" opacity="0.2"/>
    <line x1="0" y1="-20" x2="50" y2="10" stroke="#050505" stroke-width="2" opacity="0.2"/>
    <line x1="0" y1="20" x2="40" y2="50" stroke="#050505" stroke-width="2" opacity="0.2"/>
  </g>
</svg>
